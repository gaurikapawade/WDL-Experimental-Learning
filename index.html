<!DOCTYPE html>
<html>
    <head>
        <title>Student Feedback Form</title>
    </head>

    <body>
        <!--Heading-->
        <h1>Student Feedback Form</h1>
        <p>This is a simple feedback form for students.</p>
        <form>
        <!--Section 1: Student Information-->
        <fieldset>
            <legend>1. Student Information</legend>
            <label>Full Name*</label>
            <input type="text" placeholder="Enter name" required><br>
            <label>USN No.*</label>
            <input type="text" placeholder="Enter USN" required><br>
            <label>College Email ID*</label>
            <input type="email" placeholder="Enter email" required><br>
            <label>Department*</label>
            <select required>
                <option value="">Select department</option>
                <option value="CSE">CSE</option>
                <option value="ECE">IT</option>
                <option value="ME">ME</option>
                <option value="CE">AIML</option>
                <option value="EE">DS</option>
            </select><br>
            <label>Current Semester*</label>
            <select required>
                <option value="">Select semester</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
                <option value="3">3rd Semester</option>
                <option value="4">4th Semester</option>
                <option value="5">5th Semester</option>
                <option value="6">6th Semester</option>
                <option value="7">7th Semester</option>
                <option value="8">8th Semester</option>
            </select><br>
        </fieldset>

        <!--Section 2: Course Information-->
        <fieldset>
            <legend>2. Course Information</legend>
            <label>Course Name*</label>
            <input type="text" placeholder="Enter course name" required><br>
            <label>Course Code*</label>
            <input type="text" placeholder="Enter course code" required><br>
            <label>Faculty Name*</label>
            <input type="text" placeholder="Enter faculty name" required><br>
            <label>Course Type*</label>
            <select required>
                <option value="">Select course type</option>
                <option value="Theory">Theory</option>
                <option value="Practical">Practical</option>
            </select><br>
        </fieldset>


        <!--Section 3: Course Difficulty-->
        <fieldset>
            <legend>3. Course Difficulty</legend>
            <label>How would you rate the difficulty of the course?</label><br>
            <input type="radio"  required> 1 (Very Easy)<br>
            <input type="radio"> 2 (Easy)<br>
            <input type="radio"> 3 (Moderate)<br>
            <input type="radio"> 4 (Difficult)<br>
            <input type="radio"> 5 (Very Difficult)<br>
        </fieldset>

        <!--Section 4: Course Rating-->
        <fieldset>
            <legend>4. Course Rating</legend>
            <label>How would you rate the overall quality of the course?</label><br>
            <input type="range" min="1" max="10" value="5" required>
            <output>5</output><br>
        <!--Section 5: Course Outcomes-->
        <!--Section 6: Course Score-->
        <!--Section 7: Course Comments-->
        <!--Section 8: Course Recommendation-->
        <!--Section 9: Confirmation-->
        </form>
        <!--Submit and Reset Buttons-->
        <!--Footer-->

    </body>
</html>
